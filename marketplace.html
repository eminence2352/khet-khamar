<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Khet-Khamar Marketplace</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <!-- Matched fonts from index.html -->
  <link
    href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&family=Manrope:wght@500;600;700;800&display=swap"
    rel="stylesheet"
  />
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
  />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="top-header">
    <div class="logo-block">
      <p class="logo-kicker">Farmer Community</p>
      <h1 class="logo-title">Khet-Khamar</h1>
    </div>
    <!-- Matched header actions from index.html -->
    <div class="header-actions">
      <div id="authLinks" class="auth-links">
        <a href="login.html" id="loginLink" class="auth-btn" style="display: none;">Login</a>
        <a href="signup.html" id="signupLink" class="auth-btn" style="display: none;">Sign Up</a>
        <button id="logoutBtn" class="auth-btn logout" style="display: none;">Logout</button>
      </div>
    </div>
  </header>

  <main class="main-content marketplace-main">
    <section class="seller-posting-card" aria-label="Post marketplace ad">
      <h2 class="posting-title">Post Your Product</h2>
      
      <div class="marketplace-form">
        <div class="form-group">
          <label for="adTitle">Product Title</label>
          <input 
            type="text" 
            id="adTitle" 
            placeholder="e.g., Organic Rice Seeds" 
          />
        </div>

        <div class="form-group">
          <label for="adDescription">Description</label>
          <textarea 
            id="adDescription" 
            placeholder="Describe your product in detail..."
            rows="4" 
          ></textarea>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="adPrice">Price</label>
            <input 
              type="number" 
              id="adPrice" 
              placeholder="0.00" 
              min="0" 
              step="0.01" 
            />
          </div>
          <div class="form-group">
            <label for="adQuantity">Quantity</label>
            <input 
              type="number" 
              id="adQuantity" 
              placeholder="Amount" 
              min="0"
            />
          </div>
          <div class="form-group">
            <label for="adUnit">Unit</label>
            <input 
              type="text" 
              id="adUnit" 
              placeholder="e.g., kg, pieces" 
            />
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="adCategory">Category</label>
            <select id="adCategory">
              <option value="">Select a category</option>
              <option value="Seeds">Seeds</option>
              <option value="Equipment">Equipment</option>
              <option value="Fertilizer">Fertilizer</option>
              <option value="Pesticides">Pesticides</option>
              <option value="Produce">Produce</option>
              <option value="Tools">Tools</option>
              <option value="Services">Services</option>
              <option value="Other">Other</option>
            </select>
          </div>
          <div class="form-group">
            <label for="adLocation">Location</label>
            <select id="adLocation">
              <option value="">Select a location</option>
              <option value="Dhaka">Dhaka</option>
              <option value="Gazipur">Gazipur</option>
              <option value="Bogura">Bogura</option>
              <option value="Chittagong">Chittagong</option>
              <option value="Sylhet">Sylhet</option>
              <option value="Rajshahi">Rajshahi</option>
              <option value="Khulna">Khulna</option>
              <option value="Barishal">Barishal</option>
              <option value="Mymensingh">Mymensingh</option>
              <option value="Rangpur">Rangpur</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label for="adImage">Product Image</label>
          <div class="image-upload-wrapper">
            <input 
              type="file" 
              id="adImage" 
              accept="image/*" 
            />
            <div id="adImagePreview" class="image-preview" style="display: none;">
              <img id="adImagePreviewImg" alt="Product preview" />
              <button type="button" id="removeAdImage" class="remove-btn">Remove</button>
            </div>
          </div>
        </div>

        <div class="form-actions">
          <button type="button" class="submit-btn">Post Product</button>
          <button type="button" class="cancel-btn">Clear</button>
        </div>
      </div>
    </section>

    <section class="market-filter" aria-label="Marketplace filters">
      <div class="market-filter-item search-field">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input
          type="search"
          placeholder="Search products"
          aria-label="Search products"
        />
      </div>

      <div class="market-filter-item">
        <label for="categorySelect">Category</label>
        <select id="categorySelect" aria-label="Category">
          <option value="">All Categories</option>
          <option value="Seeds">Seeds</option>
          <option value="Equipment">Equipment</option>
          <option value="Fertilizer">Fertilizer</option>
          <option value="Pesticides">Pesticides</option>
          <option value="Produce">Produce</option>
          <option value="Tools">Tools</option>
          <option value="Services">Services</option>
          <option value="Other">Other</option>
        </select>
      </div>

      <div class="market-filter-item">
        <label for="locationSelect">Location</label>
        <select id="locationSelect" aria-label="Location">
          <option value="">All Locations</option>
          <option value="Dhaka">Dhaka</option>
          <option value="Gazipur">Gazipur</option>
          <option value="Bogura">Bogura</option>
          <option value="Chittagong">Chittagong</option>
          <option value="Sylhet">Sylhet</option>
          <option value="Rajshahi">Rajshahi</option>
          <option value="Khulna">Khulna</option>
          <option value="Barishal">Barishal</option>
          <option value="Mymensingh">Mymensingh</option>
          <option value="Rangpur">Rangpur</option>
        </select>
      </div>
    </section>

    <section class="market-grid" aria-label="Marketplace ads"></section>
  </main>

  <nav class="bottom-nav" aria-label="Bottom navigation">
    <a class="nav-item" href="index.html" aria-label="Home">
      <i class="fa-solid fa-house"></i>
      <span>Home</span>
    </a>
    <a class="nav-item active" href="marketplace.html" aria-label="Marketplace">
      <i class="fa-solid fa-store"></i>
      <span>Market</span>
    </a>
    <a class="nav-item nav-post" href="index.html?compose=1" aria-label="Create post">
      <i class="fa-solid fa-plus"></i>
    </a>
    <!-- Fixed News Link -->
    <a class="nav-item" href="news.html" aria-label="News">
      <i class="fa-solid fa-newspaper"></i>
      <span>News</span>
    </a>
    <a class="nav-item disabled-nav" href="#" aria-label="Profile" data-disabled-nav="true">
      <i class="fa-solid fa-user"></i>
      <span>Profile</span>
    </a>
  </nav>

  <script src="script.js"></script>
</body>
</html>
